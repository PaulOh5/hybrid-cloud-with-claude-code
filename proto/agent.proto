syntax = "proto3";

package hybridcloud.agent.v1;

option go_package = "hybridcloud/shared/proto/agent/v1;agentv1";

import "google/protobuf/timestamp.proto";

// AgentService is the bidirectional stream between a compute-agent running on
// a GPU node and the main-api. The agent opens the stream (outbound from the
// node) so that Phase 2 private-network agents can reach us through NAT.
service AgentService {
  rpc Stream(stream AgentMessage) returns (stream ControlMessage);
}

// --- Agent → API -----------------------------------------------------------

message AgentMessage {
  oneof payload {
    Register register = 1;
    Heartbeat heartbeat = 2;
    Topology topology = 3;
    InstanceStatus instance_status = 4;
    Ack ack = 5;
  }
}

message Register {
  string node_name = 1;
  string hostname = 2;
  string agent_version = 3;
  // Auth token proving the agent may register under this node_name.
  string agent_token = 4;
  Topology topology = 5;
  // Phase 2 (ADR-012): semantic flip. Previously "TCP endpoint ssh-proxy
  // should dial to reach this node's VMs". Now the ssh-proxy mux endpoint
  // advertised back to the agent is irrelevant on Register — agent learns
  // it from config — so this field is reserved for the agent's mux session
  // identifier reported back after the agent attaches its yamux/TLS data
  // plane to ssh-proxy. Kept at field 6 because Phase 1 has zero external
  // users; wire-level breaking change is acceptable.
  // TODO(Phase 2.2): remove old usage sites that still treat this as a
  // dial address and replace with mux session reporting.
  string agent_tunnel_endpoint = 6;
  // Phase 2 (Task 0.2). Optional. Populated by the agent on a re-Register
  // *after* its data plane has attached to ssh-proxy and the agent learned
  // its session id. main-api persists this for operator visibility only —
  // routing decisions still go through ssh-proxy's muxregistry.
  string mux_session_id = 7;
}

message Heartbeat {
  string node_id = 1;
  google.protobuf.Timestamp sent_at = 2;
  int32 active_instance_count = 3;
  double cpu_load_1m = 4;
  uint64 mem_free_bytes = 5;
  // Phase 2 (Task 0.2). Running agent version, repeated each heartbeat so
  // operator dashboards (Phase 2 O2) can see version drift across the fleet
  // without waiting for the next Register.
  string agent_version = 6;
}

// Topology is the physical layout of GPU resources on the node. Reported at
// register time and again whenever the agent detects a change (e.g. a GPU
// dropped off the PCI bus).
message Topology {
  repeated Gpu gpus = 1;
  repeated NvlinkPair nvlink_pairs = 2;
  bool iommu_enabled = 3;
  // Phase 5: the slot layout the operator chose for this node.
  Profile profile = 4;
}

// Profile is the operator-selected slot layout. main-api uses it to seed the
// gpu_slots table on first register and detect drift thereafter.
message Profile {
  // Human-readable name from the YAML (e.g. "2x1" for two single-GPU slots).
  string name = 1;
  // SHA-256 of the YAML bytes so main-api can detect changes without
  // comparing full slot lists.
  string hash = 2;
  repeated SlotSpec slots = 3;
}

message SlotSpec {
  int32 slot_index = 1;
  int32 gpu_count = 2;
  // GPU indices (matching Gpu.index) that make up this slot.
  repeated int32 gpu_indices = 3;
  // Optional NVLink domain identifier — slots whose gpus share a domain
  // advertise the same string here.
  string nvlink_domain = 4;
}

message Gpu {
  int32 index = 1;              // 0..N-1 stable across reboots
  string pci_address = 2;       // e.g. "0000:81:00.0"
  string model = 3;             // e.g. "NVIDIA RTX A6000"
  uint64 memory_bytes = 4;
  string iommu_group = 5;
  // "host" when bound to nvidia/amdgpu; "vfio-pci" when ready for passthrough;
  // "unknown" for unrecognised drivers.
  string driver = 6;
  // PCI addresses of companion devices (HDMI audio, on-card USB) in the same
  // IOMMU group — must be passed through together with the GPU.
  repeated string companion_pci_addresses = 7;
  // True when the GPU and every companion in its IOMMU group are bound to
  // vfio-pci, so main-api may schedule a passthrough VM onto this slot.
  bool vfio_ready = 8;
  // Human-readable reason when the GPU cannot be bound (non-empty only when
  // vfio_ready=false). Surface in operator dashboards.
  string bind_blocker = 9;
}

message NvlinkPair {
  int32 gpu_a_index = 1;
  int32 gpu_b_index = 2;
}

// InstanceStatus is emitted when the agent transitions an instance's lifecycle
// state, including failures.
message InstanceStatus {
  string instance_id = 1;
  InstanceState state = 2;
  string vm_internal_ip = 3;
  string error_message = 4;
  google.protobuf.Timestamp observed_at = 5;
}

enum InstanceState {
  INSTANCE_STATE_UNSPECIFIED = 0;
  INSTANCE_STATE_PROVISIONING = 1;
  INSTANCE_STATE_RUNNING = 2;
  INSTANCE_STATE_STOPPING = 3;
  INSTANCE_STATE_STOPPED = 4;
  INSTANCE_STATE_FAILED = 5;
}

// --- API → Agent -----------------------------------------------------------

message ControlMessage {
  oneof payload {
    RegisterAck register_ack = 1;
    CreateInstance create_instance = 2;
    DestroyInstance destroy_instance = 3;
    Ping ping = 4;
  }
}

message RegisterAck {
  string node_id = 1;           // persisted UUID
  int32 heartbeat_interval_seconds = 2;
}

message CreateInstance {
  string instance_id = 1;       // UUID assigned by main-api
  string name = 2;
  uint32 memory_mb = 3;
  uint32 vcpus = 4;
  // SSH public keys to inject into the guest via cloud-init.
  repeated string ssh_pubkeys = 5;
  // GPU slot indices on this node that the instance owns (audit metadata —
  // the agent does not resolve these).
  repeated int32 slot_indices = 6;
  // Cloud image to boot. Empty means agent's configured default.
  string image_ref = 7;
  // PCI addresses (sysfs format e.g. "0000:16:00.0") that should be attached
  // to the guest via vfio. main-api resolves these from the reserved slot's
  // GPU indices + the node's topology. Includes every IOMMU-group companion
  // (HDMI audio etc.) so libvirt can bind the whole group.
  repeated string passthrough_pci_addresses = 8;
}

message DestroyInstance {
  string instance_id = 1;
}

message Ping {
  google.protobuf.Timestamp sent_at = 1;
}

message Ack {
  string correlation_id = 1;
  bool ok = 2;
  string error_message = 3;
}
