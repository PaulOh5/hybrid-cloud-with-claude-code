name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  # Multi-module go.work — `./...` does not expand here, so paths must be
  # listed per-module. Mirrors GO_SERVICES in the Makefile.
  GO_PATHS: >-
    ./services/compute-agent/...
    ./services/main-api/...
    ./services/ssh-proxy/...
    ./shared/...

jobs:
  go-lint:
    name: Go vet + golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go vet
        run: go vet ${{ env.GO_PATHS }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5.0
          args: --timeout=5m ${{ env.GO_PATHS }}

  go-build:
    name: Go build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build services
        run: go build ${{ env.GO_PATHS }}

  go-test:
    name: Go unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Unit tests
        run: go test -race -count=1 -timeout=5m ${{ env.GO_PATHS }}

  go-integration:
    name: Go integration tests (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Integration tests
        run: go test -race -tags=integration -count=1 -timeout=15m ./services/main-api/...

  frontend-lint:
    name: Frontend lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install (workspace)
        run: pnpm install --frozen-lockfile
      - name: Lint
        working-directory: web/frontend
        run: pnpm lint
      - name: Typecheck
        working-directory: web/frontend
        run: pnpm exec tsc --noEmit

  frontend-test:
    name: Frontend unit tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install (workspace)
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        working-directory: web/frontend
        run: pnpm test
      - name: Build
        working-directory: web/frontend
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
