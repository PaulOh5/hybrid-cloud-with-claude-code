name: Deploy

# Manual deploy to the three production targets:
#   - main-api VM      (qlaud.net apex, EC2)
#   - ssh-proxy VM     (*.qlaud.net wildcard, EC2)
#   - h20a             (compute-agent only, GPU host)
#
# The build job runs once and uploads a single artifact; the three deploy
# jobs run in parallel after build + verify-ci pass, each downloading the
# artifact and pushing the relevant subset to its target.
#
# Targets are selectable via the inputs.targets matrix in case the
# operator wants to deploy only one role (e.g. ssh-proxy hotfix).

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Full commit SHA to deploy (defaults to current main HEAD)"
        required: false
        default: ""
      skip_ci_check:
        description: "Skip the 'CI green for SHA' check (emergency only)"
        type: boolean
        required: false
        default: false
      targets:
        description: "Comma-separated targets: main-api,ssh-proxy,compute-agent (default: all)"
        required: false
        default: "main-api,ssh-proxy,compute-agent"
      skip_external_smoke:
        description: "Skip the public-URL smoke check (first cutover before DNS switch)"
        type: boolean
        required: false
        default: false

concurrency:
  # Per-target concurrency so a main-api hotfix doesn't block an unrelated
  # ssh-proxy deploy. Each role still serialises against itself.
  group: deploy-prod-${{ github.event.inputs.targets || 'all' }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_PATHS: >-
    ./services/compute-agent/...
    ./services/main-api/...
    ./services/ssh-proxy/...
    ./shared/...

jobs:
  resolve-sha:
    name: Resolve target SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
      deploy_main_api:     ${{ steps.parse.outputs.deploy_main_api }}
      deploy_ssh_proxy:    ${{ steps.parse.outputs.deploy_ssh_proxy }}
      deploy_compute_agent: ${{ steps.parse.outputs.deploy_compute_agent }}
    steps:
      - uses: actions/checkout@v6
      - id: resolve
        env:
          INPUT_SHA: ${{ inputs.sha }}
        run: |
          if [[ -n "$INPUT_SHA" ]]; then
            sha="$INPUT_SHA"
          else
            sha="$(git rev-parse HEAD)"
          fi
          if [[ ! "$sha" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error::invalid sha: $sha"; exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Deploy target SHA: $sha"
      - id: parse
        env:
          TARGETS: ${{ inputs.targets }}
        run: |
          targets="${TARGETS:-main-api,ssh-proxy,compute-agent}"
          for role in main-api ssh-proxy compute-agent; do
            key="deploy_$(echo "$role" | tr '-' '_')"
            if [[ ",$targets," == *",$role,"* ]]; then
              echo "$key=true"  >> "$GITHUB_OUTPUT"
            else
              echo "$key=false" >> "$GITHUB_OUTPUT"
            fi
          done
          echo "Targets resolved: $targets"

  verify-ci:
    name: Verify CI green for SHA
    needs: resolve-sha
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_ci_check }}
    steps:
      - name: Check CI runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.resolve-sha.outputs.sha }}
        run: |
          for attempt in $(seq 1 20); do
            status=$(gh run list --workflow=ci.yml --commit "$SHA" \
              --repo "$GITHUB_REPOSITORY" \
              --json status,conclusion --limit 1 \
              | jq -r '.[0] | "\(.status):\(.conclusion)"')
            echo "[$attempt] CI status for $SHA: $status"
            case "$status" in
              completed:success)
                echo "CI green — proceeding"; exit 0 ;;
              completed:*)
                echo "::error::CI completed but not success: $status"; exit 1 ;;
              in_progress:*|queued:*|requested:*|waiting:*|pending:*|null:null|:|null:*|*:null)
                echo "CI not yet completed — sleeping 30s"; sleep 30 ;;
              *)
                echo "::error::unexpected CI status: $status"; exit 1 ;;
            esac
          done
          echo "::error::timed out waiting for CI on $SHA"
          exit 1

  build:
    name: Build artifacts
    needs: [resolve-sha, verify-ci]
    if: ${{ always() && needs.resolve-sha.result == 'success' && (needs.verify-ci.result == 'success' || needs.verify-ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-sha.outputs.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build Go binaries (linux/amd64)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.commit=${{ needs.resolve-sha.outputs.sha }}" \
            -o dist/main-api      ./services/main-api/cmd/main-api
          go build -trimpath -ldflags="-s -w -X main.commit=${{ needs.resolve-sha.outputs.sha }}" \
            -o dist/admin         ./services/main-api/cmd/admin
          go build -trimpath -ldflags="-s -w -X main.commit=${{ needs.resolve-sha.outputs.sha }}" \
            -o dist/ssh-proxy     ./services/ssh-proxy/cmd/ssh-proxy
          go build -trimpath -ldflags="-s -w -X main.commit=${{ needs.resolve-sha.outputs.sha }}" \
            -o dist/compute-agent ./services/compute-agent/cmd/compute-agent

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Build frontend (standalone)
        env:
          MAIN_API_URL: http://127.0.0.1:8080
        run: |
          pnpm install --frozen-lockfile
          (cd web/frontend && pnpm build)
          mkdir -p dist/frontend
          cp -a web/frontend/.next/standalone/. dist/frontend/
          cp -a web/frontend/.next/static dist/frontend/web/frontend/.next/static
          if [[ -d web/frontend/public ]]; then
            cp -a web/frontend/public dist/frontend/web/frontend/public
          fi
          tar -czf dist/frontend.tar.gz -C dist/frontend .
          rm -rf dist/frontend

      - name: Stage scripts (uploaded with the artifact so each target can self-update)
        run: |
          mkdir -p dist/scripts
          cp scripts/deploy.sh dist/scripts/
          cp scripts/backup.sh dist/scripts/
          cp scripts/restore.sh dist/scripts/

      - uses: actions/upload-artifact@v7
        with:
          name: deploy-${{ needs.resolve-sha.outputs.sha }}
          path: dist/
          retention-days: 14

  deploy-main-api:
    name: Deploy main-api VM (qlaud.net)
    needs: [resolve-sha, build]
    if: ${{ needs.resolve-sha.outputs.deploy_main_api == 'true' }}
    runs-on: ubuntu-latest
    environment: production-main-api
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-${{ needs.resolve-sha.outputs.sha }}
          path: dist/

      - name: Configure SSH
        env:
          SSH_KEY:       ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS:   ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$SSH_KEY" > ~/.ssh/id
          chmod 600 ~/.ssh/id
          printf '%s' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: rsync staging + scripts to remote
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          SHA: ${{ needs.resolve-sha.outputs.sha }}
        run: |
          STAGING="hybrid-cloud/staging/${SHA:0:12}"
          ssh -i ~/.ssh/id -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "rm -rf ~/${STAGING} && mkdir -p ~/${STAGING}"
          # main-api role needs: main-api, admin, frontend.tar.gz
          rsync -e "ssh -i $HOME/.ssh/id -p ${DEPLOY_PORT:-22}" -avz --chmod=u+rwx \
            dist/main-api dist/admin dist/frontend.tar.gz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:~/${STAGING}/"
          # scripts/ may have evolved; keep the host's scripts/ in sync.
          rsync -e "ssh -i $HOME/.ssh/id -p ${DEPLOY_PORT:-22}" -avz --chmod=u+rwx \
            dist/scripts/deploy.sh dist/scripts/backup.sh dist/scripts/restore.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:~/hybrid-cloud/scripts/"

      - name: Run deploy.sh on remote
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          SHA: ${{ needs.resolve-sha.outputs.sha }}
        run: |
          STAGING="hybrid-cloud/staging/${SHA:0:12}"
          ssh -i ~/.ssh/id -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "bash ~/hybrid-cloud/scripts/deploy.sh --role main-api ~/${STAGING} ${SHA}"

      - name: External smoke (qlaud.net)
        if: ${{ !inputs.skip_external_smoke }}
        env:
          DEPLOY_PUBLIC_URL: ${{ secrets.DEPLOY_PUBLIC_URL }}
        run: |
          # Hit /login (frontend) and /api/v1/instances (expects 401) over the
          # public URL — confirms TLS + Caddy + main-api end-to-end.
          curl -fsS -o /dev/null "${DEPLOY_PUBLIC_URL}/login"
          code=$(curl -s -o /dev/null -w '%{http_code}' "${DEPLOY_PUBLIC_URL}/api/v1/instances")
          [[ "$code" == "401" ]] || { echo "::error::expected 401, got $code"; exit 1; }
          echo "main-api external smoke OK"

  deploy-ssh-proxy:
    name: Deploy ssh-proxy VM (*.qlaud.net)
    needs: [resolve-sha, build]
    if: ${{ needs.resolve-sha.outputs.deploy_ssh_proxy == 'true' }}
    runs-on: ubuntu-latest
    environment: production-ssh-proxy
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-${{ needs.resolve-sha.outputs.sha }}
          path: dist/

      - name: Configure SSH
        env:
          SSH_KEY:     ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "$SSH_KEY" > ~/.ssh/id
          chmod 600 ~/.ssh/id
          printf '%s' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: rsync staging + scripts to remote
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          SHA: ${{ needs.resolve-sha.outputs.sha }}
        run: |
          STAGING="hybrid-cloud/staging/${SHA:0:12}"
          ssh -i ~/.ssh/id -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "rm -rf ~/${STAGING} && mkdir -p ~/${STAGING}"
          rsync -e "ssh -i $HOME/.ssh/id -p ${DEPLOY_PORT:-22}" -avz --chmod=u+rwx \
            dist/ssh-proxy "${DEPLOY_USER}@${DEPLOY_HOST}:~/${STAGING}/"
          rsync -e "ssh -i $HOME/.ssh/id -p ${DEPLOY_PORT:-22}" -avz --chmod=u+rwx \
            dist/scripts/deploy.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:~/hybrid-cloud/scripts/"

      - name: Run deploy.sh on remote
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          SHA: ${{ needs.resolve-sha.outputs.sha }}
        run: |
          STAGING="hybrid-cloud/staging/${SHA:0:12}"
          ssh -i ~/.ssh/id -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "bash ~/hybrid-cloud/scripts/deploy.sh --role ssh-proxy ~/${STAGING} ${SHA}"

      - name: External smoke (mux.qlaud.net:8443 TLS)
        if: ${{ !inputs.skip_external_smoke }}
        env:
          MUX_HOST:    ${{ secrets.MUX_HOST }}
          MUX_PORT:    ${{ secrets.MUX_PORT }}
        run: |
          # Verify TLS handshake on the mux endpoint — wildcard cert in SAN.
          host="${MUX_HOST:-mux.qlaud.net}"
          port="${MUX_PORT:-8443}"
          out=$(openssl s_client -connect "${host}:${port}" -servername "${host}" </dev/null 2>/dev/null | openssl x509 -noout -ext subjectAltName)
          echo "$out"
          echo "$out" | grep -q '\*.qlaud.net' || { echo "::error::wildcard SAN missing"; exit 1; }
          echo "ssh-proxy external smoke OK"

  deploy-compute-agent:
    name: Deploy compute-agent (h20a)
    needs: [resolve-sha, build]
    if: ${{ needs.resolve-sha.outputs.deploy_compute_agent == 'true' }}
    # Self-hosted runner ON h20a — preserved from the pre-split layout
    # because h20a's geo-fence blocks SSH from foreign IPs.
    runs-on: [self-hosted, h20a, production]
    environment: production-h20a
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-${{ needs.resolve-sha.outputs.sha }}
          path: dist/

      - name: Stage and run deploy.sh
        env:
          SHA: ${{ needs.resolve-sha.outputs.sha }}
        run: |
          STAGING="$HOME/hybrid-cloud/staging/${SHA:0:12}"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp dist/compute-agent "$STAGING/"
          chmod u+rwx "$STAGING/compute-agent"

          # Keep host scripts in sync with main, in case deploy.sh itself
          # changed in this commit.
          cp dist/scripts/deploy.sh "$HOME/hybrid-cloud/scripts/deploy.sh"
          chmod +x "$HOME/hybrid-cloud/scripts/deploy.sh"

          bash "$HOME/hybrid-cloud/scripts/deploy.sh" --role compute-agent "$STAGING" "$SHA"
