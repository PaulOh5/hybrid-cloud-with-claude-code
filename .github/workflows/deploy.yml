name: Deploy

# Manual deploy to the production host (h20a / qlaud.net). Phase 1 has no
# staging — operator is the gate. The workflow refuses to deploy a SHA whose
# CI is not green.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Full commit SHA to deploy (defaults to current main HEAD)"
        required: false
        default: ""
      skip_ci_check:
        description: "Skip the 'CI green for SHA' check (emergency only)"
        type: boolean
        required: false
        default: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # Never interrupt an in-flight deploy

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  GO_PATHS: >-
    ./services/compute-agent/...
    ./services/main-api/...
    ./services/ssh-proxy/...
    ./shared/...

jobs:
  resolve-sha:
    name: Resolve target SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
      - id: resolve
        env:
          INPUT_SHA: ${{ inputs.sha }}
        run: |
          if [[ -n "$INPUT_SHA" ]]; then
            sha="$INPUT_SHA"
          else
            sha="$(git rev-parse HEAD)"
          fi
          if [[ ! "$sha" =~ ^[0-9a-f]{7,40}$ ]]; then
            echo "::error::invalid sha: $sha"; exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Deploy target SHA: $sha"

  verify-ci:
    name: Verify CI green for SHA
    needs: resolve-sha
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_ci_check }}
    steps:
      - name: Check CI runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.resolve-sha.outputs.sha }}
        # No checkout in this job, so gh CLI can't infer the repo from a git
        # remote — pass it explicitly via $GITHUB_REPOSITORY. The retry loop
        # absorbs the common case where the operator triggers Deploy right
        # after a push and CI for that SHA is still queued or running. 20×30s
        # = 10 min cap, which is comfortably above the typical CI duration.
        run: |
          for attempt in $(seq 1 20); do
            status=$(gh run list --workflow=ci.yml --commit "$SHA" \
              --repo "$GITHUB_REPOSITORY" \
              --json status,conclusion --limit 1 \
              | jq -r '.[0] | "\(.status):\(.conclusion)"')
            echo "[$attempt] CI status for $SHA: $status"
            case "$status" in
              completed:success)
                echo "CI green — proceeding"; exit 0 ;;
              completed:*)
                echo "::error::CI completed but not success: $status"; exit 1 ;;
              in_progress:*|queued:*|requested:*|waiting:*|pending:*|null:null|:|null:*|*:null)
                echo "CI not yet completed — sleeping 30s"; sleep 30 ;;
              *)
                echo "::error::unexpected CI status: $status"; exit 1 ;;
            esac
          done
          echo "::error::timed out waiting for CI on $SHA"
          exit 1

  build:
    name: Build artifacts
    needs: [resolve-sha, verify-ci]
    # `if: always()` lets the build run when verify-ci was skipped via input,
    # but only if its predecessors did not actually fail.
    if: ${{ always() && needs.resolve-sha.result == 'success' && (needs.verify-ci.result == 'success' || needs.verify-ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-sha.outputs.sha }}

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build Go binaries (linux/amd64)
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w -X main.commit=${{ needs.resolve-sha.outputs.sha }}" \
            -o dist/main-api      ./services/main-api/cmd/main-api
          go build -trimpath -ldflags="-s -w -X main.commit=${{ needs.resolve-sha.outputs.sha }}" \
            -o dist/ssh-proxy     ./services/ssh-proxy/cmd/ssh-proxy
          go build -trimpath -ldflags="-s -w -X main.commit=${{ needs.resolve-sha.outputs.sha }}" \
            -o dist/compute-agent ./services/compute-agent/cmd/compute-agent

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Build frontend (standalone)
        env:
          # Same-origin: the browser hits /api/v1/* on the frontend host and
          # next.config.ts rewrites to MAIN_API_URL server-side.
          MAIN_API_URL: http://127.0.0.1:8080
        run: |
          pnpm install --frozen-lockfile
          (cd web/frontend && pnpm build)
          # Next.js 16 standalone in a pnpm workspace keeps the monorepo
          # layout, so server.js lands at .next/standalone/web/frontend/.
          # static + public must sit next to that server.js — not at the
          # standalone root, or Next can't find the chunks at runtime.
          mkdir -p dist/frontend
          cp -a web/frontend/.next/standalone/. dist/frontend/
          cp -a web/frontend/.next/static dist/frontend/web/frontend/.next/static
          if [[ -d web/frontend/public ]]; then
            cp -a web/frontend/public dist/frontend/web/frontend/public
          fi
          tar -czf dist/frontend.tar.gz -C dist/frontend .
          rm -rf dist/frontend

      - uses: actions/upload-artifact@v7
        with:
          name: deploy-${{ needs.resolve-sha.outputs.sha }}
          path: dist/
          retention-days: 14

  preflight:
    name: Pre-deploy host validation
    # Runs on the same self-hosted runner that deploy uses — checks the host
    # state (env file keys, paths, free space, container health, etc.) so
    # config drift fails the run BEFORE deploy.sh starts mutating production.
    needs: resolve-sha
    runs-on: [self-hosted, h20a, production]
    environment: production
    steps:
      - name: Run preflight.sh
        run: bash "$HOME/hybrid-cloud/scripts/preflight.sh"

  deploy:
    name: Deploy to h20a
    needs: [resolve-sha, build, preflight]
    # Self-hosted runner runs ON h20a as the `hybrid` user. The host's
    # public IP is geo-blocked for foreign sources, so SSH from
    # GitHub-hosted runners isn't possible — outbound from h20a is.
    runs-on: [self-hosted, h20a, production]
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: deploy-${{ needs.resolve-sha.outputs.sha }}
          path: dist/

      - name: Stage artifacts and run deploy.sh
        env:
          SHA: ${{ needs.resolve-sha.outputs.sha }}
        run: |
          STAGING="$HOME/hybrid-cloud/staging/${SHA:0:12}"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp dist/main-api dist/ssh-proxy dist/compute-agent dist/frontend.tar.gz "$STAGING/"
          chmod u+rwx "$STAGING"/main-api "$STAGING"/ssh-proxy "$STAGING"/compute-agent

          # deploy.sh lives in the host checkout (~/hybrid-cloud/scripts/),
          # not in the runner workspace — keeps the deploy logic stable
          # across in-flight workflow edits.
          bash "$HOME/hybrid-cloud/scripts/deploy.sh" "$STAGING" "$SHA"

      - name: Local smoke check
        run: |
          # Already validated by deploy.sh's per-service smoke; this is a
          # double-check from outside the deploy script proper, hitting the
          # same loopback endpoints the script does. External smoke from a
          # foreign IP is blocked (geo-fence), so we don't attempt it.
          source "$HOME/hybrid-cloud/.env.production"
          HTTP_PORT="${MAIN_API_HTTP_ADDR##*:}"
          curl -fsS -o /dev/null "http://127.0.0.1:${HTTP_PORT}/metrics"
          code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${HTTP_PORT}/api/v1/instances")
          [[ "$code" == "401" ]] || { echo "::error::expected 401, got $code"; exit 1; }
          echo "smoke OK"
