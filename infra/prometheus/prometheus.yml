global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: main-api
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]

  # compute-agent + ssh-proxy expose /metrics on the listed ports once
  # Phase 10.2's per-service patches land. Until then these scrapes will
  # log connection errors — harmless but expected.
  - job_name: compute-agent
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8082"]

  - job_name: ssh-proxy
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8083"]
