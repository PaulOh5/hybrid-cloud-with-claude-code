services:
  postgres:
    image: postgres:16-alpine
    container_name: hybrid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hybrid
      POSTGRES_PASSWORD: hybrid
      POSTGRES_DB: hybrid
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hybrid -d hybrid"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
